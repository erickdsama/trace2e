<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>trace2e · traces</title>
<style>
  :root { --bg:#f6f7f9; --panel:#fff; --fg:#1a1a1a; --muted:#6b7280; --border:#e5e7eb; --accent:#2563eb; --danger:#dc2626; --ok:#16a34a; --var:#dc2626; }
  @media (prefers-color-scheme: dark){ :root{ --bg:#0e1116; --panel:#161b22; --fg:#e6edf3; --muted:#9198a1; --border:#2a2f37; } }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.5 system-ui,sans-serif; color:var(--fg); background:var(--bg); }
  header { display:flex; gap:10px; align-items:center; padding:12px 16px; border-bottom:1px solid var(--border); background:var(--panel); position:sticky; top:0; flex-wrap:wrap; }
  header h1 { font-size:16px; margin:0; margin-right:auto; }
  input, button { font:inherit; padding:6px 10px; border:1px solid var(--border); border-radius:7px; background:var(--panel); color:var(--fg); }
  input { min-width:260px; }
  button { cursor:pointer; }
  button.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
  button.danger { color:var(--danger); }
  #status { font-size:12px; color:var(--muted); }
  main { display:grid; grid-template-columns: 340px 1fr; gap:16px; padding:16px; align-items:start; }
  @media (max-width:800px){ main{ grid-template-columns:1fr; } }
  .card { background:var(--panel); border:1px solid var(--border); border-radius:10px; }
  .list { overflow:hidden; }
  .row { padding:10px 12px; border-bottom:1px solid var(--border); cursor:pointer; }
  .row:last-child { border-bottom:0; }
  .row:hover, .row.sel { background:color-mix(in srgb, var(--accent) 10%, transparent); }
  .row .name { font-weight:600; }
  .row .meta { font-size:12px; color:var(--muted); }
  .detail { padding:16px; }
  .muted { color:var(--muted); }
  .chips { display:flex; gap:6px; flex-wrap:wrap; margin:8px 0; }
  .chip { font-size:12px; border:1px solid var(--border); border-radius:999px; padding:1px 8px; }
  .chip.secret { color:var(--var); border-color:var(--var); }
  ol.steps { margin:0; padding-left:22px; }
  ol.steps li { margin:5px 0; }
  .type { font-size:10px; font-weight:700; text-transform:uppercase; color:var(--accent); }
  code { font-size:12px; word-break:break-all; }
  .var { color:var(--var); font-weight:600; }
  .bar { display:flex; gap:8px; align-items:center; margin-bottom:10px; flex-wrap:wrap; }
  img.shot { max-width:100%; border:1px solid var(--border); border-radius:8px; margin:6px 0; }
  .empty { padding:24px; text-align:center; color:var(--muted); }
</style>
</head>
<body>
<header>
  <h1>trace2e · traces</h1>
  <input id="token" type="password" placeholder="access token (TRACE2E_TOKEN)" />
  <button id="connect" class="primary">Connect</button>
  <button id="refresh" title="Reload">↻</button>
  <span id="status"></span>
</header>
<main>
  <div class="card list" id="list"><div class="empty">Enter the token and Connect.</div></div>
  <div class="card detail" id="detail"><div class="empty">Select a trace.</div></div>
</main>
<script>
const $ = (id) => document.getElementById(id);
const api = (p, opts={}) => fetch(p, { ...opts, headers: { Authorization: "Bearer " + token(), ...(opts.headers||{}) } });
const token = () => localStorage.getItem("trace2e_token") || "";
const esc = (s) => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
let selected = null;

$("token").value = token();
$("connect").onclick = () => { localStorage.setItem("trace2e_token", $("token").value.trim()); load(); };
$("refresh").onclick = load;

function setStatus(msg, err) { const s = $("status"); s.textContent = msg; s.style.color = err ? "var(--danger)" : "var(--muted)"; }

function describe(step) {
  switch (step.type) {
    case "navigate": return "→ " + esc(step.url);
    case "click": return esc(step.target?.primary || "");
    case "fill": return esc(step.target?.primary||"") + " = " + (step.variableRef ? '<span class="var">{{'+esc(step.variableRef)+'}}</span>' : esc(JSON.stringify(step.value ?? "")));
    case "press": return "key " + esc(step.key);
    case "select": return esc(step.target?.primary||"") + " = " + esc(step.label ?? step.value);
    case "waitFor": return "wait " + esc(step.url ?? step.target?.primary ?? step.state ?? "");
    case "assert": return "expect " + esc(step.target?.primary ?? "url") + " " + esc(step.kind) + " " + esc(JSON.stringify(step.expected ?? ""));
    case "delay": return "delay " + esc(step.ms) + " ms";
    case "customJs": return "evaluate: " + esc((step.code||"").slice(0,80));
    case "hook": return esc(step.phase) + " hook: " + esc((step.code||"").slice(0,70));
    default: return esc(step.type);
  }
}

async function load() {
  if (!token()) return setStatus("no token", true);
  setStatus("loading…");
  try {
    const res = await api("/traces");
    if (!res.ok) throw new Error("HTTP " + res.status + (res.status===401?" (bad token)":""));
    const traces = await res.json();
    renderList(traces);
    setStatus(traces.length + " trace(s)");
  } catch (e) { setStatus(e.message, true); }
}

function renderList(traces) {
  const el = $("list");
  if (!traces.length) { el.innerHTML = '<div class="empty">No traces yet. Record one in the extension and upload.</div>'; return; }
  el.innerHTML = "";
  for (const t of traces) {
    const row = document.createElement("div");
    row.className = "row" + (t.id === selected ? " sel" : "");
    row.innerHTML = '<div class="name">'+esc(t.name)+'</div><div class="meta">'+new Date(t.createdAt).toLocaleString()+' · '+t.stepCount+' steps</div>';
    row.onclick = () => showDetail(t.id);
    el.appendChild(row);
  }
}

async function showDetail(id) {
  selected = id;
  document.querySelectorAll(".row").forEach(r => r.classList.remove("sel"));
  const d = $("detail");
  d.innerHTML = '<div class="empty">loading…</div>';
  try {
    const t = await (await api("/traces/" + id)).json();
    const vars = (t.variables||[]).map(v => '<span class="chip '+(v.kind==="secret"?"secret":"")+'">{{'+esc(v.name)+'}} · '+esc(v.kind)+'/'+esc(v.source)+'</span>').join("");
    const steps = (t.steps||[]).map(s => '<li><span class="type">'+esc(s.type)+'</span> <code>'+describe(s)+'</code></li>').join("");
    d.innerHTML =
      '<div class="bar"><b>'+esc(t.name)+'</b>'
      + '<button id="dl">Download JSON</button>'
      + '<button id="del" class="danger">Delete</button>'
      + '<span class="muted">'+esc(t.startUrl||"")+'</span></div>'
      + (vars ? '<div class="chips">'+vars+'</div>' : '')
      + '<ol class="steps">'+steps+'</ol>'
      + '<div id="shots"></div>';
    $("dl").onclick = () => { const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([JSON.stringify(t,null,2)],{type:"application/json"})); a.download=t.name+".json"; a.click(); };
    $("del").onclick = async () => { if(!confirm("Delete “"+t.name+"”?")) return; await api("/traces/"+id,{method:"DELETE"}); selected=null; d.innerHTML='<div class="empty">Deleted.</div>'; load(); };
    // screenshots (optional)
    const shots = await (await api("/traces/"+id+"/screenshots")).json();
    const keys = Object.keys(shots||{});
    if (keys.length) $("shots").innerHTML = '<h4>Screenshots</h4>' + keys.map(k => '<img class="shot" alt="'+esc(k)+'" src="data:image/png;base64,'+shots[k]+'">').join("");
  } catch (e) { d.innerHTML = '<div class="empty">'+esc(e.message)+'</div>'; }
}

if (token()) load();
</script>
</body>
</html>
