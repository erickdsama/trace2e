name: Publish daemon image

# Builds the trace2e daemon image and pushes it to GitHub Container Registry (GHCR):
#   ghcr.io/erickdsama/trace2e-daemon
#
# Tags produced:
#   - push to main      → :latest, :main
#   - push tag vX.Y.Z   → :X.Y.Z, :X.Y, :latest
# Deploy the published image (no local build) with:
#   NO_BUILD=1 IMAGE=ghcr.io/erickdsama/trace2e-daemon:latest \
#     TRACE2E_TOKEN=… deploy/digitalocean/deploy.sh <droplet-ip>

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/trace2e-daemon
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: daemon/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
