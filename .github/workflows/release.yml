name: Release

# On a vX.Y.Z tag: cross-compile the light Go client for every platform (~5 MB each) and
# build the Chrome extension zip. All from one Linux runner. Attach to the GitHub Release.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- light client binaries (Go, static, cross-compiled) ---
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Build client binaries
        working-directory: client
        run: |
          # The client embeds the slash-command templates — sync from the canonical copies.
          cp ../daemon/templates/trace2e.md trace2e.md
          cp ../daemon/templates/trace2e-debug.md trace2e-debug.md
          mkdir -p ../release
          build() { GOOS="$1" GOARCH="$2" go build -ldflags "-s -w" -o "../release/$3" .; }
          build linux   amd64 trace2e-linux-x64
          build linux   arm64 trace2e-linux-arm64
          build darwin  amd64 trace2e-darwin-x64
          build darwin  arm64 trace2e-darwin-arm64
          build windows amd64 trace2e-windows-x64.exe

      # --- Chrome extension (unpacked → zip) ---
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm ext:build
      - name: Zip extension
        run: cd extension/.output/chrome-mv3 && zip -qr "$GITHUB_WORKSPACE/release/trace2e-extension-chrome.zip" .

      - name: List assets
        run: ls -lh release
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          body: |
            **Light trace2e client** (~5 MB static binary, no Node needed). It installs the
            MCP server + the `/trace2e` and `/trace2e-debug` commands into a project and
            talks to your hosted daemon.

            1. Download the binary for your OS (`trace2e-<os>-<arch>`), then in your project:
               ```
               ./trace2e-<os>-<arch> init --token <your-token>
               ```
               (Daemon URL defaults to the hosted daemon; override with `--url`. Get your
               token from the daemon dashboard: sign up / log in → **Copy token**.)
            2. Load `trace2e-extension-chrome.zip` in Chrome (unpacked). Right-click the
               extension icon → **Options** → paste your token → Save. Record a flow and
               upload it.
            3. In Claude Code: `/trace2e <flow>` generates Playwright tests;
               `/trace2e-debug <problem> flow: <flow>` replays the recording to diagnose a bug.
