name: Release

# On a vX.Y.Z tag: build the lightweight client artifacts and attach them to the Release.
# The client only needs Node (which Claude Code users already have), so we ship the small
# JS bundle instead of a 90 MB self-contained binary.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm dist
      - name: Collect release assets
        run: |
          mkdir -p release
          cp dist/trace2e-use.tgz release/
          cp dist/trace2e-use/bin/trace2e.mjs release/trace2e.mjs
          chmod +x release/trace2e.mjs
          ls -lh release
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          body: |
            Lightweight trace2e client — needs Node 18+.

            - **trace2e.mjs** (~750 KB) — single-file CLI. Set up a project:
              ```
              node trace2e.mjs init --token <your-token>
              ```
              (Daemon URL defaults to the hosted daemon; override with `--url`.)
            - **trace2e-use.tgz** — turnkey package (Chrome extension + the CLI).

            Prefer a no-Node binary? `pnpm binary` builds one locally (it's ~90 MB — Node
            embedded — so it's not shipped here).
